<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>글쓰기</title>
<style>
	body {
		padding: 20px;
		display: flex;
		flex-direction: column;
		margin: 0 auto;
		margin-top: 20px;
		width: 80%;
		align-items: center;
	}
	
	h2 {
		border-left: 5px solid MediumSeaGreen;
		padding-left: 20px;
		width: 80%;
		margin-bottom: 30px;
	}
	
	form {
		border: 1px solid #ccc;
		padding: 30px;
		width: 80%;
		margin: 0 auto;
		background-color: #fff;
		border-radius: 12px;
		box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
		display: flex;
		flex-direction: column;
		align-items: center;
	}
	
	label {
		display: block;
		margin-bottom: 10px;
		font-weight: bold;
		color: #444;
		font-size: 16px;
	}
	
	input[type="text"], textarea {
		width: 80%;
		padding: 12px 15px;
		margin-bottom: 20px;
		border: 1px solid #ddd;
		border-radius: 8px;
		box-sizing: border-box; /* 패딩이 너비에 포함되도록! */
		font-size: 15px;
		transition: border-color 0.3s;
	}
	
	input:focus, textarea:focus {
		outline: none; /* 클릭 시 반응하는 테두리(기본) 제거 */
		border-color: #007bff;
		box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
	}
	
	textarea {
	resize: vertical; /* 세로로만 늘릴 수 있게 제한 */
	min-height: 150px;
}

	button[type="submit"] {
		width: 100%;
		padding: 14px;
		background-color: MediumSeaGreen;
		color: white;
		border: none;
		border-radius: 10px;
		font-size: 16px;
		font-weight: bold;
		cursor: pointer;
		transition: background 0.3s;
		margin-bottom: 0px;
	}
	
	button:hover {
		background-color: green;
	}
	
	a {
		color: #aaa;
		text-decoration: none;
		transition: color 0.3s;
	}
	
	a:hover {
		color: green;
	}
</style>
</head>
<body>
	<h2>글쓰기</h2>
	<form th:action="@{/noticex}" method="post">
		<label>아이디</label>
		<input type="text" name="id" placeholder="아이디를 입력하세요." required><br>
		
		<label>제목</label>
		<input type="text" name="title" placeholder="제목을 입력하세요." required><br>
		
		<label>내용</label>
		<textarea rows="5" cols="20" name="content" placeholder="내용을 입력하세요." required></textarea><br>
		
		<label>작성자</label>
		<input type="text" name="writer" placeholder="작성자를 입력하세요." required><br>
		
		<button type="submit">게시하기</button><br> 
		<small><a th:href="@{/noticex}">목록으로</a></small>
	</form>
</body>
</html>
