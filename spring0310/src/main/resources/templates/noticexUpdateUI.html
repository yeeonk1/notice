<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>게시글 수정하기</title>
<style>
	body {
		margin: auto;
		display: flex;
		flex-direction: column;
		align-items: center;
	}
	
	h2 {
		border-left: 5px solid Tomato;
		padding-left: 20px;
		width: 80%;
		margin: 30px;
	}
	
	form {
		border: 1px solid #ccc;
		border-radius: 8px;
		box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		width: 80%;
		display: flex;
		flex-direction: column;
		align-items: center;
	}
	
	label {
		display: block;
		margin: 10px;
		color: #444;
		font-weight: bold;
		font-size: 16px;
	}
	
	input[type="text"], textarea {
		width: 80%;
		padding: 12px 15px;
		margin-bottom: 20px;
		border: 1px solid #ddd;
		border-radius: 8px;
		box-sizing: border-box; /* 패딩이 너비에 포함되도록! */
		font-size: 15px;
		transition: border-color 0.3s;
	}
	
	button {
		padding: 10px 30px;
		font-size: 16px;
		border: none;
		background-color: Tomato;
		border-radius: 8px;
		color: white;
		transition: background-color 0.3s;
	}
	
	button:hover {
		background-color: #f93a00;
		cursor: pointer;
	}
</style>
</head>
<body>
	<h2>게시글 수정하기</h2>
	<form th:action="@{/noticex/update}" th:method="put">
		<input type="hidden" name="id" th:value="${noticex.id}"><br>
		
		<label>작성자</label>
		<input type="text" name="writer" th:value="${noticex.writer}"><br>
		
		<label>제목</label>
		<input type="text" name="title" th:value="${noticex.title}"><br>
		
		<label>내용</label>
		<textarea name="content" th:text="${noticex.content}"></textarea><br>
		
		<button type="submit">완료</button><br>
	</form>
</body>
</html>
