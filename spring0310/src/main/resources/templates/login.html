<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="container">
		<h1>로그인</h1>
		<form th:action="@{/login}" method="post">
			<div class="form-group">
				<label>아이디</label>
				<input type="text" name="userId" placeholder="아이디를 입력해 주세요."><br>
				<label>비밀번호</label>
				<input type="password" name="userPw" placeholder="비밀번호를 입력해 주세요."><br>
				<label>이름</label>
				<input type="text" name="userName" placeholder="이름을 입력해 주세요."><br>
			</div>
			<button type="submit" class="btn-primary">로그인</button><br>
			
			<p th:if="${errorMsg}" th:text="${errorMsg}" style="color: #dc3545; font-size: 13px; margin-top: 15px;">
				아이디 혹은 비밀번호가 일치하지 않습니다.
			</p>
		</form>
		<div style="margin-top: 20px;">
			<small class="small">아직 회원이 아니신가요? <a th:href="@{/join}" class="small">회원가입 하러가기</a></small><br>
			<small class="small"><a th:href="@{/}" class="small">홈으로 돌아가기</a></small>
		</div>
	</div>
</body>
</html>
