<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 목록</title>
<style>
	body {
		padding: 20px;
		background-color: #f8f9fa;
		display: flex; /* 부모 선언 (자식들 가로 정렬 디폴트) */
		flex-direction: column; /* 자식들 세로 정렬*/
		align-items: center; /* 제목과 테이블 가로 중앙 */
	}
	
	.container {
		width: 85%;
		margin: 0 auto;
	}
	
	h2 {
		width: 100%; /* 테이블과 너비 맞추기 */
		color: #333;
		margin-bottom: 20px;
		border-left: 5px solid #007bff; /* 제목 왼쪽 테두리 선 두껍게 파란색 */
		padding-left: 15px;
	}
	
	table {
		width: 100%;
		border: 1px solid #ccc;
		border-collapse: collapse;
		background-color: white;
		box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		border-radius: 8px;
		overflow: hidden; /* 테이블 바깥선 없애기 */
		/* table은 깎였지만, th td는 여전히 뾰족하게 때문에 튀어나온 것을 잘라버림 */
	}
	
	th, td {
		padding: 12px 15px;
		text-align: center;
		border-bottom: 1px solid #eee; /* 가로선 연하게 */
	}
	
	thead tr {
		background-color: #007bff;
		color: white;
		font-weight: bold;
	}
	
	tbody tr:hover {
		background-color: #f1f1f1;
	}
	
	a {
		text-decoration: none;
		color: #333;
		font-weight: 500;
	}
	
	a:hover {
		color: #007bff;
		text-decoration: underline;
	}
	
	.btn-write {
		display: inline-block; /* 내 너비만큼만 차지, 다른 요소가 옆에 올 수 있게 */
		margin-top: 20px;
		padding: 10px 20px;
		background-color: #28a745;
		color: white;
		border-radius: 5px;
		transition: background 0.3s; /* 마우스를 올렸을 때 배경색 변화 시간 지정 */
		/* hover에 주면 마우스를 올릴 때만 적용되기 때문에 마우스를 뗄 때까지 적용하려면 그냥 a에 줘야함 */
	}
	
	.btn-write:hover {
		background-color: #218838;
		color: white;
		text-decoration: none;
	}
	
	td[colspan="5"] {
		color: #999;
		padding: 50px 0; /* 상하 좌우(text-align: center 덕분에 어차피 중간에 옴) */
	}
</style>
</head>
<body>
	<div class="container">
	<h2>공지사항 목록</h2>
		<div>
			<table border="1">
				<thead>
					<tr>
						<th>아이디</th>
						<th>글제목</th>
						<th>글쓴이</th>
						<th>게시일</th>
						<th>조회수</th>
					</tr>
				</thead>
				
				<tbody>
					<tr th:each="n : ${noticex}">
						<td th:text="${n.id}"></td>
						<td>
							<a th:href="@{/noticex/{id}(id=${noticex.id})}" th:text="${n.title}"></a>
						</td>
						<td th:text="${n.writer}"></td>
						<td th:text="${n.regDate}"></td>
						<td th:text="${n.hit}"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(noticex)}">
						<td colspan="5">등록된 공지사항이 없습니다.</td>
					</tr>
				</tbody>
			</table>
		</div>
		<a th:href="@{/noticex/write}" class="btn-write">글쓰기</a>
	</div>
</body>
</html>
